<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xiaou0's Blog</title>
    <link rel="icon" href="resources/icon.png">
    <link rel="stylesheet" href="post.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-inner">
            <a class="site-title" href="index.html">
                <span class="site-title-hash" aria-hidden="true"># </span>xiaou0's blog
            </a>
            <nav>
                <button class="nav-toggle">[-]</button>
                <a href="index.html">[Home]</a>
                <a href="http://localhost:8080/post.html?slug=about">[About]</a>
                <a href="https://github.com/xiaou00/xiaou00.github.io">[GitHub]</a>
            </nav>
            <nav class="lang-nav">
                <a id="lang-en" href="post.html" class="lang-active">[English]</a>
                <a id="lang-zh" href="post.zh.html">[中文]</a>
            </nav>
        </div>
    </aside>

    <main class="content">
        <!-- markdown content rendered here -->
    </main>

    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
    <script defer src="js/render-post.js"></script>
    <script>
        const slug = new URLSearchParams(location.search).get('slug');
        if (slug) {
            document.getElementById('lang-en').href = 'post.html?slug=' + slug;
            document.getElementById('lang-zh').href = 'post.zh.html?slug=' + slug;
        }
        document.querySelectorAll('.nav-toggle').forEach(btn => {
            btn.addEventListener('click', () => {
                const collapsed = btn.closest('.sidebar').classList.toggle('collapsed');
                btn.textContent = collapsed ? '[+]' : '[-]';
            });
        });
    </script>
</body>
</html>
